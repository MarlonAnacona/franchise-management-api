version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: postgres_franchise
    restart: always
    environment:
      POSTGRES_DB: franchise_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespw
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: franchise_app
    depends_on:
      - postgres
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/franchise_management
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgrespw
    restart: always

volumes:
  postgres_data: